<!DOCTYPE html>
<html lang="en" style="-webkit-text-size-adjust: 100%;">

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MC7H8XFN47"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-MC7H8XFN47');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Levix | Authenticate</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent-blue: #3b82f6;
            --accent-blue-hover: #2563eb;
            --accent-no: #ef4444;
            --accent-yes: #22c55e;
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --border-color: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .login-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
            transition: height 0.3s ease;
        }

        .brand-container {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-weight: 700;
            font-size: 2rem;
            color: var(--text-primary);
            line-height: 1.2;
            letter-spacing: -0.025em;
        }

        .subtitle {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-top: 4px;
            display: block;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 0.75rem 1.5rem;
            background-color: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }

        .btn-primary:hover:not(:disabled) {
            background-color: var(--accent-blue-hover);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .status-message {
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
            text-align: center;
            padding: 0.5rem;
            border-radius: 6px;
        }

        .error-message {
            color: var(--accent-no);
            background-color: rgba(239, 68, 68, 0.1);
        }

        .success-message {
            color: var(--accent-yes);
            background-color: rgba(34, 197, 94, 0.1);
        }

        .links {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.875rem;
        }

        .links a {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 500;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .loading-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .is-loading .loading-spinner {
            display: block;
        }

        .is-loading .btn-text {
            display: none;
        }

        /* Form Toggle Animation */
        #login-section, #register-section {
            transition: opacity 0.3s ease;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="brand-container">
            <h1>LEVIX</h1>
            <span class="subtitle" id="form-subtitle">Welcome Back</span>
        </div>

        <!-- ================= LOGIN SECTION ================= -->
        <div id="login-section">
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" required placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required placeholder="Enter your password">
                </div>

                <div id="login-error-msg" class="status-message error-message"></div>

                <button type="submit" id="login-submit-btn" class="btn-primary">
                    <span class="loading-spinner"></span>
                    <span class="btn-text">Sign In</span>
                </button>
            </form>
            
            <div class="links">
                <a href="/forgot-password">Forgot your password?</a>
            </div>
        </div>

        <!-- ================= REGISTER SECTION ================= -->
        <div id="register-section" style="display: none;">
            <form id="register-form">
                <div class="form-group">
                    <label for="reg-shop-name">Shop Name</label>
                    <input type="text" id="reg-shop-name" required placeholder="Your shop's name">
                </div>

                <div class="form-group">
                    <label for="reg-owner-name">Owner Name</label>
                    <input type="text" id="reg-owner-name" required placeholder="Your full name">
                </div>

                <div class="form-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" required placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label for="reg-phone">Phone Number</label>
                    <input type="tel" id="reg-phone" pattern="[0-9]{10}" maxlength="10" required placeholder="10-digit mobile number">
                </div>

                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" required placeholder="Create a password">
                </div>

                <div id="reg-status-msg" class="status-message"></div>

                <button type="submit" id="register-submit-btn" class="btn-primary">
                    <span class="loading-spinner"></span>
                    <span class="btn-text">Create Account</span>
                </button>
            </form>
        </div>

        <!-- ================= TOGGLE ================= -->
        <div class="links" style="margin-top: 2rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
            <span id="toggle-text">
                <span id="toggle-prefix">Don't have an account?</span> <a href="#" id="toggle-mode-btn">Register</a>
            </span>
        </div>
    </div>

    <script>
        // Check if already logged in — redirect to dashboard
        if (localStorage.getItem('token')) {
            window.location.href = '/dashboard';
        }

        // --- Toggle Logic ---
        const loginSection = document.getElementById('login-section');
        const registerSection = document.getElementById('register-section');
        const toggleBtn = document.getElementById('toggle-mode-btn');
        const toggleText = document.getElementById('toggle-text');
        const formSubtitle = document.getElementById('form-subtitle');

        let isLoginMode = true;

        toggleBtn.addEventListener('click', (e) => {
            e.preventDefault();
            isLoginMode = !isLoginMode;

            const togglePrefix = document.getElementById('toggle-prefix');

            if (isLoginMode) {
                // Show Login
                registerSection.style.display = 'none';
                loginSection.style.display = 'block';
                formSubtitle.textContent = 'Welcome Back';
                togglePrefix.textContent = "Don't have an account?";
                toggleBtn.textContent = "Register";
            } else {
                // Show Register
                loginSection.style.display = 'none';
                registerSection.style.display = 'block';
                formSubtitle.textContent = 'Create an Account';
                togglePrefix.textContent = "Already have an account?";
                toggleBtn.textContent = "Sign In";
            }
            
            // clear messages
            document.getElementById('login-error-msg').style.display = 'none';
            document.getElementById('reg-status-msg').style.display = 'none';
        });

        // --- Login Submission ---
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('login-submit-btn');
            const errorMsg = document.getElementById('login-error-msg');

            btn.classList.add('is-loading');
            btn.disabled = true;
            errorMsg.style.display = 'none';

            const formData = new URLSearchParams();
            formData.append('username', email);
            formData.append('password', password);

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                const data = await response.json();

                if (response.ok && data.access_token) {
                    localStorage.setItem('token', data.access_token);
                    window.location.href = '/dashboard';
                } else {
                    errorMsg.textContent = data.detail || 'Login failed. Please check your credentials.';
                    errorMsg.className = 'status-message error-message';
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                errorMsg.textContent = 'An error occurred. Please try again.';
                errorMsg.className = 'status-message error-message';
                errorMsg.style.display = 'block';
            } finally {
                btn.classList.remove('is-loading');
                btn.disabled = false;
            }
        });

        // --- Register Submission ---
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const shop_name = document.getElementById('reg-shop-name').value.trim();
            const owner_name = document.getElementById('reg-owner-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const phone_number = document.getElementById('reg-phone').value.trim();
            const password = document.getElementById('reg-password').value;

            const btn = document.getElementById('register-submit-btn');
            const statusMsg = document.getElementById('reg-status-msg');

            if (!shop_name || !owner_name || !email || !phone_number || !password) {
                statusMsg.textContent = 'All fields are required.';
                statusMsg.className = 'status-message error-message';
                statusMsg.style.display = 'block';
                return;
            }

            if (!/^\d{10}$/.test(phone_number)) {
                statusMsg.textContent = 'Phone number must be exactly 10 digits.';
                statusMsg.className = 'status-message error-message';
                statusMsg.style.display = 'block';
                return;
            }

            btn.classList.add('is-loading');
            btn.disabled = true;
            statusMsg.style.display = 'none';

            const payload = {
                shop_name: shop_name,
                owner_name: owner_name,
                email: email,
                phone_number: phone_number,
                password: password
            };

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json().catch(() => null);

                if (response.ok) {
                    statusMsg.textContent = data?.message || 'Account created successfully! You can now sign in.';
                    statusMsg.className = 'status-message success-message';
                    statusMsg.style.display = 'block';
                    document.getElementById('register-form').reset();
                    
                    // After short delay, switch back to login mode automatically
                    setTimeout(() => {
                        document.getElementById('toggle-mode-btn').click();
                        // prefill email
                        document.getElementById('login-email').value = email;
                        document.getElementById('login-password').focus();
                    }, 2000);
                } else {
                    statusMsg.textContent = data?.detail || data?.message || 'Registration failed. Please try again.';
                    statusMsg.className = 'status-message error-message';
                    statusMsg.style.display = 'block';
                }
            } catch (error) {
                statusMsg.textContent = 'Network error. Please try again.';
                statusMsg.className = 'status-message error-message';
                statusMsg.style.display = 'block';
            } finally {
                btn.classList.remove('is-loading');
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
