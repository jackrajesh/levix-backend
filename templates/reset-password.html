<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MC7H8XFN47"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-MC7H8XFN47');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Levix | Reset Password</title>
    <meta name="description" content="Enter your OTP and set a new password for your Levix account.">
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #1d4ed8;
            --primary-light: #60a5fa;
            --blue-soft: #2563eb;
            --bg: #040d1a;
            --border: rgba(59,130,246,0.12);
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --text-dim: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== Animated Background ===== */
        .bg-scene { position: fixed; inset: 0; z-index: 0; overflow: hidden; }

        .bg-gradient {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 10% 20%, rgba(37,99,235,0.22) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 90% 80%, rgba(59,130,246,0.14) 0%, transparent 60%),
                linear-gradient(135deg, #020810 0%, #040d1a 50%, #030a14 100%);
        }

        .grid-lines {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(59,130,246,0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59,130,246,0.07) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 50%, transparent 100%);
        }

        .orb { position: absolute; border-radius: 50%; filter: blur(80px); animation: float-orb 12s ease-in-out infinite; }
        .orb-1 { width: 450px; height: 450px; background: radial-gradient(circle, rgba(37,99,235,0.22), transparent 70%); top: -10%; left: -5%; }
        .orb-2 { width: 320px; height: 320px; background: radial-gradient(circle, rgba(59,130,246,0.18), transparent 70%); bottom: -5%; right: -5%; animation-delay: -6s; }

        @keyframes float-orb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -40px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        .particle { position: absolute; width: 2px; height: 2px; border-radius: 50%; background: rgba(59,130,246,0.9); animation: twinkle var(--dur, 4s) ease-in-out infinite; animation-delay: var(--delay, 0s); }
        @keyframes twinkle { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

        /* ===== Form Card ===== */
        .page-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .form-card {
            width: 100%;
            max-width: 460px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(59,130,246,0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 44px 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), 0 0 60px rgba(59,130,246,0.08);
            animation: slide-up-fade 0.6s ease-out both;
        }

        @keyframes slide-up-fade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container { text-align: center; margin-bottom: 28px; }
        .logo-text { font-size: 2.2rem; font-weight: 900; letter-spacing: -2px; color: var(--text); }
        .logo-text span {
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-header { text-align: center; margin-bottom: 32px; }
        .form-header h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: 8px; }
        .form-header p { color: var(--text-muted); font-size: 0.9rem; line-height: 1.6; }

        /* OTP box */
        .otp-hint {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(37,99,235,0.12);
            border: 1px solid rgba(59,130,246,0.25);
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 0.8rem;
            font-weight: 700;
            color: #93c5fd;
            margin-bottom: 28px;
        }

        .form-group { margin-bottom: 18px; }

        .form-label {
            display: block;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .input-wrapper { position: relative; }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            display: flex;
            align-items: center;
            transition: color 0.2s;
            pointer-events: none;
        }

        .form-input {
            width: 100%;
            padding: 13px 14px 13px 44px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.25s ease;
        }
        .form-input::placeholder { color: var(--text-dim); }
        .form-input:focus {
            border-color: rgba(59,130,246,0.6);
            background: rgba(59,130,246,0.06);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.12), 0 0 20px rgba(59,130,246,0.08);
        }
        .form-input:focus ~ .input-icon { color: #60a5fa; }
        .form-input[readonly] {
            background: rgba(255,255,255,0.02);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        /* OTP Special input */
        .otp-input {
            text-align: center;
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: 8px;
            padding-left: 14px;
        }

        .pw-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-dim);
            padding: 4px;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }
        .pw-toggle:hover { color: var(--text-muted); }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 28px;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-submit:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(37,99,235,0.45);
        }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .btn-submit.loading .spinner { display: block; }
        .btn-submit.loading .btn-label { display: none; }

        .status-msg {
            font-size: 0.9rem;
            font-weight: 600;
            padding: 14px 16px;
            border-radius: 12px;
            margin-top: 20px;
            text-align: center;
            display: none;
            animation: fade-in 0.3s ease;
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .status-error {
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.25);
            color: #fca5a5;
        }
        .status-success {
            background: rgba(34,197,94,0.12);
            border: 1px solid rgba(34,197,94,0.25);
            color: #86efac;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 28px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: color 0.2s;
            width: 100%;
            justify-content: center;
        }
        .back-link:hover { color: #60a5fa; }

        @media (max-width: 480px) {
            .form-card { padding: 32px 24px; border-radius: 20px; }
        }
    </style>
</head>
<body>

<div class="bg-scene">
    <div class="bg-gradient"></div>
    <div class="grid-lines"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="particles" id="particles"></div>
</div>

<div class="page-wrapper">
    <div class="form-card">

        <div class="logo-container">
            <div class="logo-text">LEVI<span>X</span></div>
        </div>

        <div class="form-header">
            <h2>Set New Password 🔐</h2>
            <p>Enter the OTP sent to your email and choose a strong new password.</p>
        </div>

        <form id="reset-form">
            <!-- Email (pre-filled, read-only) -->
            <div class="form-group">
                <label class="form-label" for="email">Account Email</label>
                <div class="input-wrapper">
                    <div class="input-icon">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    </div>
                    <input type="email" class="form-input" id="email" required placeholder="you@shop.com" readonly autocomplete="email">
                </div>
            </div>

            <!-- OTP -->
            <div class="form-group">
                <label class="form-label" for="otp">6-Digit OTP</label>
                <div class="input-wrapper">
                    <div class="input-icon">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    </div>
                    <input type="text" class="form-input otp-input" id="otp" required placeholder="• • • • • •" maxlength="6" pattern="\d{6}" inputmode="numeric" autocomplete="one-time-code">
                </div>
                <div style="display: flex; justify-content: flex-end; margin-top: 8px;">
                    <button type="button" id="resend-btn" style="background:none; border:none; color:var(--primary-light); font-size:0.8rem; font-weight:600; cursor:pointer; padding:4px;">Resend OTP</button>
                    <span id="resend-timer" style="color:var(--text-dim); font-size:0.8rem; display:none; padding:4px;"></span>
                </div>
            </div>

            <!-- New Password -->
            <div class="form-group">
                <label class="form-label" for="password">New Password</label>
                <div class="input-wrapper">
                    <div class="input-icon">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </div>
                    <input type="password" class="form-input" id="password" required placeholder="Min. 8 characters" minlength="8" autocomplete="new-password">
                    <button type="button" class="pw-toggle" onclick="togglePw()">
                        <svg id="pw-eye" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>

            <div id="status-msg" class="status-msg"></div>

            <button type="submit" id="submit-btn" class="btn-submit">
                <div class="spinner"></div>
                <span class="btn-label">Reset My Password</span>
                <svg class="btn-label" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </button>
        </form>

        <a href="/login" class="back-link">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Back to Login
        </a>

    </div>
</div>

<script>
    // Particle generator
    const container = document.getElementById('particles');
    for (let i = 0; i < 40; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.top = Math.random() * 100 + '%';
        p.style.setProperty('--dur', (3 + Math.random() * 5) + 's');
        p.style.setProperty('--delay', (-Math.random() * 8) + 's');
        p.style.width = p.style.height = (Math.random() > 0.7 ? 3 : 2) + 'px';
        container.appendChild(p);
    }

    // Password toggle
    function togglePw() {
        const input = document.getElementById('password');
        const icon = document.getElementById('pw-eye');
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        icon.innerHTML = isHidden
            ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
            : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }

    // Auto-fill email from URL
    const urlParams = new URLSearchParams(window.location.search);
    const emailParam = urlParams.get('email');
    if (emailParam) {
        document.getElementById('email').value = emailParam;
    } else {
        document.getElementById('email').removeAttribute('readonly');
    }

    // Only allow digits in OTP
    document.getElementById('otp').addEventListener('input', function() {
        this.value = this.value.replace(/\D/g, '');
    });

    const API_BASE = '';
    const resendBtn = document.getElementById('resend-btn');
    const resendTimer = document.getElementById('resend-timer');
    const statusMsg = document.getElementById('status-msg');

    let cooldownSeconds = 0;

    function startCooldown(seconds) {
        cooldownSeconds = seconds;
        resendBtn.style.display = 'none';
        resendTimer.style.display = 'block';
        
        const interval = setInterval(() => {
            cooldownSeconds--;
            resendTimer.textContent = `Resend in ${cooldownSeconds}s`;
            if (cooldownSeconds <= 0) {
                clearInterval(interval);
                resendBtn.style.display = 'block';
                resendTimer.style.display = 'none';
            }
        }, 1000);
    }

    // Initialize 30s cooldown on page load
    startCooldown(30);

    resendBtn.addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        if (!email) return;

        resendBtn.disabled = true;
        try {
            const response = await fetch(`${API_BASE}/resend-otp`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            const data = await response.json();

            if (response.ok) {
                statusMsg.textContent = '✓ New OTP sent to your email!';
                statusMsg.className = 'status-msg status-success';
                statusMsg.style.display = 'block';
                startCooldown(30);
            } else {
                statusMsg.textContent = data.detail || 'Failed to resend OTP.';
                statusMsg.className = 'status-msg status-error';
                statusMsg.style.display = 'block';
                // If 429, respect the cooldown or spam shield
                if (response.status === 429) {
                    // If it contains "5 minutes", maybe we don't start a 30s cooldown but just keep it blocked
                    // but for simplicity we'll just show the message
                }
            }
        } catch (error) {
            statusMsg.textContent = 'Network error. Please try again.';
            statusMsg.className = 'status-msg status-error';
            statusMsg.style.display = 'block';
        } finally {
            resendBtn.disabled = false;
        }
    });

    // Form submission
    document.getElementById('reset-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const otp = document.getElementById('otp').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('submit-btn');

        btn.classList.add('loading');
        btn.disabled = true;
        statusMsg.style.display = 'none';

        try {
            const response = await fetch(`${API_BASE}/reset-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, otp, new_password: password })
            });

            const data = await response.json();

            if (response.ok) {
                statusMsg.textContent = '✓ Password reset successfully! Redirecting...';
                statusMsg.className = 'status-msg status-success';
                statusMsg.style.display = 'block';
                
                btn.innerHTML = '<span>Redirecting...</span>';
                btn.style.background = 'linear-gradient(135deg,#22c55e,#16a34a)';
                
                setTimeout(() => {
                    window.location.href = '/login';
                }, 2000);
            } else {
                statusMsg.textContent = data.detail || 'Reset failed. Check your OTP.';
                statusMsg.className = 'status-msg status-error';
                statusMsg.style.display = 'block';
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        } catch (error) {
            statusMsg.textContent = 'Network error. Please try again.';
            statusMsg.className = 'status-msg status-error';
            statusMsg.style.display = 'block';
            btn.classList.remove('loading');
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
