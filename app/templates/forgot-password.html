<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MC7H8XFN47"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-MC7H8XFN47');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Levix | Forgot Password</title>
    <meta name="description" content="Reset your Levix account password.">
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #1d4ed8;
            --primary-light: #60a5fa;
            --blue: #3b82f6;
            --blue-soft: #2563eb;
            --bg: #040d1a;
            --surface: rgba(255,255,255,0.04);
            --border: rgba(59,130,246,0.12);
            --border-focus: rgba(59,130,246,0.6);
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --text-dim: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== Animated Background ===== */
        .bg-scene {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-gradient {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse 80% 60% at 10% 20%, rgba(37,99,235,0.22) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 90% 80%, rgba(59,130,246,0.14) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 50% 50%, rgba(4,13,26,0.8) 0%, transparent 100%),
                linear-gradient(135deg, #020810 0%, #040d1a 50%, #030a14 100%);
        }

        .grid-lines {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(59,130,246,0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59,130,246,0.07) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 50%, transparent 100%);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: float-orb 12s ease-in-out infinite;
        }
        .orb-1 {
            width: 450px; height: 450px;
            background: radial-gradient(circle, rgba(37,99,235,0.22), transparent 70%);
            top: -10%; left: -5%;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 320px; height: 320px;
            background: radial-gradient(circle, rgba(59,130,246,0.18), transparent 70%);
            bottom: -5%; right: -5%;
            animation-delay: -6s;
        }

        @keyframes float-orb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -40px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            background: rgba(59,130,246,0.9);
            animation: twinkle var(--dur, 4s) ease-in-out infinite;
            animation-delay: var(--delay, 0s);
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* ===== Centered Form Panel ===== */
        .page-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .form-card {
            width: 100%;
            max-width: 440px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(59,130,246,0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), 0 0 60px rgba(59,130,246,0.1);
            animation: slide-up-fade 0.6s ease-out both;
        }

        @keyframes slide-up-fade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-text {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            color: var(--text);
        }
        .logo-text span {
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .form-header h2 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .form-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .form-input {
            width: 100%;
            padding: 14px 14px 14px 42px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.25s ease;
        }
        .form-input::placeholder { color: var(--text-dim); }

        .form-input:focus {
            border-color: rgba(59,130,246,0.6);
            background: rgba(59,130,246,0.06);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.12), 0 0 20px rgba(59,130,246,0.08);
        }
        .form-input:focus ~ .input-icon { color: #60a5fa; }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 28px;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-submit:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(37,99,235,0.45);
        }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .btn-submit.loading .spinner { display: block; }
        .btn-submit.loading .btn-label { display: none; }

        .status-msg {
            font-size: 0.9rem;
            font-weight: 600;
            padding: 14px 16px;
            border-radius: 12px;
            margin-top: 20px;
            text-align: center;
            display: none;
            animation: fade-in 0.3s ease;
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .status-error {
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.25);
            color: #fca5a5;
        }
        .status-success {
            background: rgba(34,197,94,0.12);
            border: 1px solid rgba(34,197,94,0.25);
            color: #86efac;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 32px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: color 0.2s;
            width: 100%;
            justify-content: center;
        }
        .back-link:hover {
            color: #60a5fa;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .form-card { padding: 32px 24px; border-radius: 20px; }
            .logo-text { font-size: 2rem; }
        }
    </style>
</head>
<body>

<!-- Animated Background -->
<div class="bg-scene">
    <div class="bg-gradient"></div>
    <div class="grid-lines"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="particles" id="particles"></div>
</div>

<div class="page-wrapper">
    <div class="form-card">
        <div class="logo-container">
            <div class="logo-text">LEVI<span>X</span></div>
        </div>

        <div class="form-header">
            <h2>Reset Password</h2>
            <p>Enter your email and we'll send you an OTP to quickly rest your password.</p>
        </div>

        <form id="forgot-form">
            <div class="form-group">
                <label class="form-label" for="email">Account Email</label>
                <div class="input-wrapper">
                    <div class="input-icon">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    </div>
                    <input type="email" class="form-input" id="email" required placeholder="you@shop.com" autocomplete="email">
                </div>
            </div>

            <div id="status-msg" class="status-msg"></div>

            <button type="submit" id="submit-btn" class="btn-submit">
                <div class="spinner"></div>
                <span class="btn-label">Send Reset OTP</span>
                <svg class="btn-label" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </form>

        <a href="/login" class="back-link">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Back to Login
        </a>
    </div>
</div>

<script>
    // Particle generator
    const container = document.getElementById('particles');
    for (let i = 0; i < 40; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.top = Math.random() * 100 + '%';
        p.style.setProperty('--dur', (3 + Math.random() * 5) + 's');
        p.style.setProperty('--delay', (-Math.random() * 8) + 's');
        p.style.width = p.style.height = (Math.random() > 0.7 ? 3 : 2) + 'px';
        container.appendChild(p);
    }

    const API_BASE = '';
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const btn = document.getElementById('submit-btn');
        const statusMsg = document.getElementById('status-msg');

        btn.classList.add('loading');
        btn.disabled = true;
        statusMsg.style.display = 'none';

        try {
            const response = await fetch(`${API_BASE}/forgot-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            const data = await response.json();

            if (response.ok) {
                statusMsg.textContent = data.message || 'OTP sent successfully! Redirecting...';
                statusMsg.className = 'status-msg status-success';
                statusMsg.style.display = 'block';
                
                // Show success styling on button
                btn.innerHTML = '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg><span>Redirecting...</span>';
                btn.style.background = 'linear-gradient(135deg,#22c55e,#16a34a)';
                
                setTimeout(() => {
                    window.location.href = `/reset-password?email=${encodeURIComponent(email)}`;
                }, 2000);
            } else {
                statusMsg.textContent = data.detail || 'An error occurred processing your request.';
                statusMsg.className = 'status-msg status-error';
                statusMsg.style.display = 'block';
                btn.classList.remove('loading');
                btn.disabled = false;
                
                // If it's a rate limit or spam block, we might want to change the button look slightly but keep it active or reset it
                btn.innerHTML = '<span class="btn-label">Send Reset OTP</span><svg class="btn-label" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';
            }
        } catch (error) {
            statusMsg.textContent = 'A network error occurred. Please try again.';
            statusMsg.className = 'status-msg status-error';
            statusMsg.style.display = 'block';
            btn.classList.remove('loading');
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
