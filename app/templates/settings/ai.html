<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AI Assistant Settings — LEVIX</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f1a;--surface:#1a1a2e;--surface2:#222240;
  --primary:#6C63FF;--primary-light:#a78bfa;--accent:#4ade80;
  --text:#e8e8f8;--text-muted:#9999bb;--border:#2e2e50;
  --radius:14px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;padding:40px 20px;}
.container{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:640px;padding:32px;}
h1{font-size:24px;font-weight:700;margin-bottom:8px;color:#fff;}
p.subtext{color:var(--text-muted);font-size:14px;margin-bottom:32px;}
.form-group{margin-bottom:24px;}
.form-group label{display:block;font-size:14px;font-weight:600;margin-bottom:8px;}
.form-text{font-size:13px;color:var(--text-muted);margin-bottom:12px;line-height:1.5;}
select, input[type="text"]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--text);font-family:inherit;font-size:14px;outline:none;}
select:focus, input[type="text"]:focus{border-color:var(--primary);}
.switch-row{display:flex;align-items:center;justify-content:space-between;padding:16px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:12px;}
.switch-info strong{display:block;font-size:14.5px;font-weight:600;}
.switch-info span{font-size:12.5px;color:var(--text-muted);}
/* Toggle switch */
.switch{position:relative;display:inline-block;width:44px;height:24px;}
.switch input{opacity:0;width:0;height:0;}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:var(--border);transition:.3s;border-radius:24px;}
.slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background-color:white;transition:.3s;border-radius:50%;}
input:checked + .slider{background-color:var(--primary);}
input:checked + .slider:before{transform:translateX(20px);}

.save-btn{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;border:none;border-radius:8px;padding:12px 24px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity 0.2s;width:100%;margin-top:16px;}
.save-btn:hover{opacity:0.9;}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid rgba(74,222,128,0.4);color:var(--accent);padding:12px 24px;border-radius:8px;font-size:14px;font-weight:500;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div class="container">
  <h1>AI Assistant Settings</h1>
  <p class="subtext">Configure how the LEVIX AI engine interacts with your customers.</p>

  <div class="switch-row">
    <div class="switch-info">
      <strong>Enable AI Assistant</strong>
      <span>Allow AI to auto-reply to customers.</span>
    </div>
    <label class="switch">
      <input type="checkbox" id="ai_enabled" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="switch-row">
    <div class="switch-info">
      <strong>Escalate on Uncertainty</strong>
      <span>Route to human when confidence is low.</span>
    </div>
    <label class="switch">
      <input type="checkbox" id="escalate" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="form-group">
    <label>Assistant Tone</label>
    <p class="form-text">Choose the personality of the AI.</p>
    <select id="tone">
      <option value="friendly">Friendly & Casual</option>
      <option value="professional">Professional</option>
      <option value="basic">Basic & Direct</option>
    </select>
  </div>

  <button class="save-btn" onclick="saveSettings()">Save Configuration</button>
</div>

<div class="toast" id="toast">Settings saved successfully!</div>

<script>
  function saveSettings() {
    const btn = document.querySelector('.save-btn');
    btn.textContent = "Saving...";
    setTimeout(() => {
      btn.textContent = "Save Configuration";
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }, 600);
  }
</script>
</body>
</html>
